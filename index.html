<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | My Daily Rhythm (A1)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wolf: {
                            dark: '#0B0F19',
                            panel: '#151C2C',
                            emerald: '#1DB954',
                            accent: '#38bdf8'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { background-color: #0B0F19; color: white; overflow: hidden; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0B0F19; }
        ::-webkit-scrollbar-thumb { background: #1DB954; border-radius: 4px; }

        /* Animations */
        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Flip Card Base */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; transition: transform 0.6s; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        /* Custom UI Elements */
        .glass-panel {
            background: rgba(21, 28, 44, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .correct-pulse { animation: correctPulse 1s infinite; }
        @keyframes correctPulse {
            0% { box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(29, 185, 84, 0); }
            100% { box-shadow: 0 0 0 0 rgba(29, 185, 84, 0); }
        }
    </style>
</head>
<body class="flex flex-col h-screen text-slate-100">

    <!-- TOP NAVIGATION -->
    <header class="glass-panel h-16 flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white transition">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="font-bold tracking-widest text-sm text-gray-300">
                WOLF LABS <span class="text-wolf-emerald mx-2">|</span> MAIN SERIES
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleTeacherBoard()" class="px-4 py-1.5 rounded-full bg-slate-800 hover:bg-slate-700 text-sm font-semibold text-emerald-400 border border-emerald-500/30 transition">
                <i class="fas fa-chalkboard-teacher mr-2"></i> Teacher Board
            </button>
            <button onclick="toggleFullScreen()" class="text-gray-400 hover:text-white transition">
                <i class="fas fa-expand text-xl"></i>
            </button>
        </div>
    </header>

    <!-- MAIN WORKSPACE -->
    <div class="flex-1 flex overflow-hidden relative">
        
        <!-- RETRACTABLE DASHBOARD (SIDEBAR) -->
        <aside id="sidebar" class="w-64 glass-panel absolute h-full z-40 transform -translate-x-full transition-transform duration-300 flex flex-col">
            <div class="p-4 border-b border-white/10">
                <h3 class="font-bold text-gray-200">Session Navigation</h3>
            </div>
            <div class="flex-1 overflow-y-auto p-2" id="nav-links">
                <!-- Populated by JS -->
            </div>
        </aside>

        <!-- TEACHER BOARD (RIGHT SLIDEOVER) -->
        <aside id="teacher-board" class="w-80 glass-panel absolute right-0 h-full z-40 transform translate-x-full transition-transform duration-300 flex flex-col border-l border-white/10">
            <div class="p-4 border-b border-white/10 bg-slate-800/50 flex justify-between items-center">
                <h3 class="font-bold text-emerald-400"><i class="fas fa-bolt mr-2"></i>Live Tools</h3>
                <button onclick="toggleTeacherBoard()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-4 flex-1 flex flex-col gap-4">
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider mb-2 block">Quick Vocabulary Insert</label>
                    <input type="text" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:outline-none focus:border-emerald-500" placeholder="Type word here...">
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider mb-2 block">Correction Board</label>
                    <textarea class="w-full h-32 bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:outline-none focus:border-emerald-500" placeholder="Student said: ...&#10;Better: ..."></textarea>
                </div>
                <button class="bg-emerald-600 hover:bg-emerald-500 text-white rounded p-2 text-sm font-bold mt-auto transition">
                    Send to Student Screen
                </button>
            </div>
        </aside>

        <!-- SLIDE CONTAINER -->
        <main id="slide-container" class="flex-1 relative overflow-y-auto overflow-x-hidden flex items-center justify-center">
            <!-- Slides rendered here -->
        </main>

    </div>

    <!-- FOOTER / PROGRESS -->
    <footer class="h-24 glass-panel flex items-center justify-between px-8 z-50 border-t border-white/10">
        <div class="w-1/3 flex justify-start">
            <button onclick="prevSlide()" class="text-gray-400 hover:text-white transition px-6 py-3 rounded-full hover:bg-white/5 border border-transparent hover:border-white/10 flex items-center gap-2 font-semibold">
                <i class="fas fa-arrow-left"></i> Back
            </button>
        </div>
        
        <div class="w-1/3 flex justify-center">
            <button onclick="nextSlide()" class="bg-emerald-500 hover:bg-emerald-400 text-black px-12 py-4 rounded-full font-black text-xl shadow-[0_0_25px_rgba(29,185,84,0.5)] transition transform hover:scale-105 hover:-translate-y-1 flex items-center gap-3 border border-emerald-400">
                NEXT <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <div class="w-1/3 flex justify-end items-center gap-4">
            <div class="flex flex-col items-end">
                <span id="step-counter" class="text-sm text-gray-300 font-mono font-bold">1/34</span>
                <div class="w-32 h-2 mt-1 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                    <div id="progress-bar" class="h-full bg-emerald-500 transition-all duration-300 shadow-[0_0_10px_rgba(29,185,84,0.8)]" style="width: 5%;"></div>
                </div>
            </div>
        </div>
    </footer>

    <!-- INTERACTION LOGIC & DATA -->
    <script>
        // Data Structure for the 34 Steps
        const slides = [
            // ==========================================
            // TEACHER GUIDE (Steps 1-3)
            // ==========================================
            {
                title: "TG: Overview",
                content: `
                    <div class="max-w-4xl w-full p-8 slide-up">
                        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-8 shadow-2xl">
                            <h1 class="text-3xl font-bold text-emerald-400 mb-6 border-b border-slate-700 pb-4">TEACHER GUIDE <span class="text-white text-xl">| Overview</span></h1>
                            <div class="grid grid-cols-2 gap-8">
                                <div>
                                    <h3 class="text-gray-400 text-sm uppercase tracking-wider mb-2">Topic</h3>
                                    <p class="text-xl font-semibold mb-6">My Daily Rhythm (Daily Life & Habits)</p>
                                    
                                    <h3 class="text-gray-400 text-sm uppercase tracking-wider mb-2">Grammar Focus</h3>
                                    <p class="text-xl font-semibold mb-6">Verb To Be & Simple Present</p>
                                    
                                    <h3 class="text-gray-400 text-sm uppercase tracking-wider mb-2">Target Level</h3>
                                    <p class="text-xl font-semibold text-blue-400">A1 (Beginner - Insecure Profile)</p>
                                </div>
                                <div>
                                    <h3 class="text-gray-400 text-sm uppercase tracking-wider mb-2">Duration</h3>
                                    <p class="text-xl font-semibold mb-6">60 Minutes</p>
                                    
                                    <h3 class="text-gray-400 text-sm uppercase tracking-wider mb-2">Objectives</h3>
                                    <ul class="list-disc list-inside text-gray-300 space-y-2">
                                        <li>Student will confidently introduce themselves using 'To Be'.</li>
                                        <li>Student will describe their basic daily routine.</li>
                                        <li>Student will differentiate states (I am) vs actions (I do).</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                title: "TG: Profile Strategy",
                content: `
                    <div class="max-w-4xl w-full p-8 slide-up">
                        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-8 shadow-2xl">
                            <h1 class="text-3xl font-bold text-emerald-400 mb-6 border-b border-slate-700 pb-4">TEACHER GUIDE <span class="text-white text-xl">| A1 Insecure Profile Strategy</span></h1>
                            
                            <div class="bg-blue-900/20 border border-blue-500/30 rounded-lg p-6 mb-6">
                                <h2 class="text-blue-400 font-bold mb-2"><i class="fas fa-shield-alt mr-2"></i> Psychological Safety First</h2>
                                <p class="text-gray-300">This student is insecure. Do not rush. Celebrate small wins. Over-praise correct pronunciation of basic words.</p>
                            </div>

                            <div class="grid grid-cols-2 gap-6">
                                <div class="bg-slate-800 rounded p-5 border border-slate-700">
                                    <h3 class="text-emerald-400 font-bold mb-3">DO THIS</h3>
                                    <ul class="text-gray-300 space-y-2 text-sm">
                                        <li><i class="fas fa-check text-emerald-500 mr-2"></i> Let them read before speaking.</li>
                                        <li><i class="fas fa-check text-emerald-500 mr-2"></i> Use the UI visuals to point out rules.</li>
                                        <li><i class="fas fa-check text-emerald-500 mr-2"></i> Smile, nod, and say "Exactly" often.</li>
                                        <li><i class="fas fa-check text-emerald-500 mr-2"></i> Give them time to process (wait 3-5 seconds).</li>
                                    </ul>
                                </div>
                                <div class="bg-slate-800 rounded p-5 border border-slate-700">
                                    <h3 class="text-red-400 font-bold mb-3">AVOID THIS</h3>
                                    <ul class="text-gray-300 space-y-2 text-sm">
                                        <li><i class="fas fa-times text-red-500 mr-2"></i> Interrupting mid-sentence to correct grammar.</li>
                                        <li><i class="fas fa-times text-red-500 mr-2"></i> Using complex meta-language (don't say "auxiliary verb", say "helper word").</li>
                                        <li><i class="fas fa-times text-red-500 mr-2"></i> Showing frustration if they forget "is/are".</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                title: "TG: Interaction Logic",
                content: `
                    <div class="max-w-4xl w-full p-8 slide-up">
                        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-8 shadow-2xl">
                            <h1 class="text-3xl font-bold text-emerald-400 mb-6 border-b border-slate-700 pb-4">TEACHER GUIDE <span class="text-white text-xl">| Flow & STT Target</span></h1>
                            
                            <div class="flex items-center justify-between bg-slate-800 p-4 rounded-lg border border-slate-700 mb-8">
                                <span class="font-bold text-gray-300">Target Student Talking Time (STT):</span>
                                <span class="text-2xl font-black text-emerald-400">80%</span>
                            </div>

                            <h3 class="text-gray-400 text-sm uppercase tracking-wider mb-4">The Interaction Loop (Follow this strictly):</h3>
                            
                            <div class="flex items-center justify-between space-x-2 text-center text-sm font-semibold">
                                <div class="bg-slate-800 p-4 rounded-lg flex-1 border border-slate-700 text-gray-300"><i class="fas fa-mouse-pointer block text-xl mb-2 text-blue-400"></i>1. Prompt</div>
                                <i class="fas fa-arrow-right text-gray-500"></i>
                                <div class="bg-slate-800 p-4 rounded-lg flex-1 border border-slate-700 text-gray-300"><i class="fas fa-user block text-xl mb-2 text-emerald-400"></i>2. Student Acts</div>
                                <i class="fas fa-arrow-right text-gray-500"></i>
                                <div class="bg-slate-800 p-4 rounded-lg flex-1 border border-slate-700 text-gray-300"><i class="fas fa-check-circle block text-xl mb-2 text-green-400"></i>3. Validation</div>
                                <i class="fas fa-arrow-right text-gray-500"></i>
                                <div class="bg-emerald-900/30 p-4 rounded-lg flex-1 border border-emerald-500/50 text-emerald-300"><i class="fas fa-comments block text-xl mb-2"></i>4. Speak Starter</div>
                            </div>
                            
                            <p class="text-gray-400 text-sm mt-6 text-center">Every interaction on the screen unlocks a "Follow-up Question" for you to ask. Use them to bridge grammar into reality.</p>
                        </div>
                    </div>
                `
            },

            // ==========================================
            // COVER (Step 4)
            // ==========================================
            {
                title: "Cover",
                content: `
                    <div class="w-full h-full flex flex-col items-center justify-center bg-gradient-to-br from-[#1DB954] via-[#0f3b20] to-[#020617] slide-up">
                        <div class="text-center">
                            <h2 class="text-emerald-300 tracking-[0.3em] font-bold text-sm mb-4">WOLF LABS | MAIN SERIES | A1</h2>
                            <h1 class="text-7xl md:text-9xl font-black text-white mb-6 tracking-tight shadow-black drop-shadow-2xl">
                                MY DAILY<br>RHYTHM
                            </h1>
                            <p class="text-2xl text-emerald-100 font-light mt-4">States, Actions, and Life.</p>
                            
                            <button onclick="nextSlide()" class="mt-12 px-8 py-4 bg-white text-emerald-900 rounded-full font-bold text-lg hover:bg-gray-200 transition transform hover:scale-105 shadow-[0_0_30px_rgba(29,185,84,0.5)]">
                                Start Session
                            </button>
                        </div>
                    </div>
                `
            },

            // ==========================================
            // WARM-UP (Steps 5-6)
            // ==========================================
            {
                title: "Warm-up: Mood",
                content: `
                    <div class="w-full h-full flex flex-col items-center justify-center bg-gradient-to-br from-indigo-900 via-slate-900 to-black slide-up p-4 md:p-8">
                        <h2 class="text-3xl md:text-5xl font-bold mb-8 text-center text-white">How are you today?</h2>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-4xl">
                            <button onclick="selectMood(this, 'I am tired today.', 'Why are you tired? Did you sleep well?')" class="mood-card group bg-slate-800/50 border border-white/10 p-6 rounded-2xl hover:bg-slate-700 hover:border-emerald-500 focus:bg-emerald-900/50 focus:border-emerald-500 transition duration-300 flex flex-col items-center gap-4">
                                <span class="text-5xl group-hover:scale-110 transition">😴</span>
                                <span class="text-xl font-bold text-gray-300 group-hover:text-white">Tired</span>
                            </button>
                            <button onclick="selectMood(this, 'I am great today!', 'That is wonderful! What is making you feel great?')" class="mood-card group bg-slate-800/50 border border-white/10 p-6 rounded-2xl hover:bg-slate-700 hover:border-emerald-500 focus:bg-emerald-900/50 focus:border-emerald-500 transition duration-300 flex flex-col items-center gap-4">
                                <span class="text-5xl group-hover:scale-110 transition">🤩</span>
                                <span class="text-xl font-bold text-gray-300 group-hover:text-white">Great</span>
                            </button>
                            <button onclick="selectMood(this, 'I am a little nervous.', 'It is okay! English class is a safe space. Take a deep breath.')" class="mood-card group bg-slate-800/50 border border-white/10 p-6 rounded-2xl hover:bg-slate-700 hover:border-emerald-500 focus:bg-emerald-900/50 focus:border-emerald-500 transition duration-300 flex flex-col items-center gap-4">
                                <span class="text-5xl group-hover:scale-110 transition">😬</span>
                                <span class="text-xl font-bold text-gray-300 group-hover:text-white">Nervous</span>
                            </button>
                            <button onclick="selectMood(this, 'I am fine, thank you.', 'Good! Are you ready to start our session?')" class="mood-card group bg-slate-800/50 border border-white/10 p-6 rounded-2xl hover:bg-slate-700 hover:border-emerald-500 focus:bg-emerald-900/50 focus:border-emerald-500 transition duration-300 flex flex-col items-center gap-4">
                                <span class="text-5xl group-hover:scale-110 transition">🙂</span>
                                <span class="text-xl font-bold text-gray-300 group-hover:text-white">Fine</span>
                            </button>
                        </div>

                        <div id="mood-speak" class="hidden mt-8 p-6 bg-emerald-900/30 border border-emerald-500/50 rounded-xl max-w-2xl w-full text-center fade-in">
                            <p id="mood-result" class="text-2xl font-bold text-emerald-400 mb-4"></p>
                            <div class="pt-4 border-t border-emerald-500/30">
                                <p class="text-gray-400 text-xs uppercase mb-1 tracking-wider">Teacher Follow-up</p>
                                <p id="mood-followup" class="text-lg text-white font-light"></p>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                title: "Warm-up: This or That",
                content: `
                    <div class="w-full h-full flex flex-col items-center justify-center bg-gradient-to-b from-slate-900 to-slate-950 slide-up p-8">
                        <h2 class="text-4xl font-bold mb-4 text-center text-white">What is your morning rhythm?</h2>
                        <p class="text-gray-400 mb-12">Choose one to reveal your sentence.</p>
                        
                        <div class="flex gap-8 max-w-4xl w-full">
                            <button onclick="revealChoice('choice-1', 'I am a coffee person. I drink coffee every day.')" class="flex-1 group relative rounded-3xl overflow-hidden aspect-square border-2 border-slate-800 hover:border-amber-500 transition-all duration-300">
                                <div class="absolute inset-0 bg-black/40 group-hover:bg-black/10 transition z-10"></div>
                                <img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?auto=format&fit=crop&q=80&w=800" class="absolute inset-0 w-full h-full object-cover transform group-hover:scale-110 transition duration-700">
                                <div class="absolute inset-0 z-20 flex items-center justify-center">
                                    <span class="text-4xl font-black text-white drop-shadow-lg">COFFEE</span>
                                </div>
                            </button>

                            <button onclick="revealChoice('choice-1', 'I am a tea person. I drink tea in the morning.')" class="flex-1 group relative rounded-3xl overflow-hidden aspect-square border-2 border-slate-800 hover:border-green-500 transition-all duration-300">
                                <div class="absolute inset-0 bg-black/40 group-hover:bg-black/10 transition z-10"></div>
                                <img src="https://images.unsplash.com/photo-1597481499750-3e6b22637e12?auto=format&fit=crop&q=80&w=800" class="absolute inset-0 w-full h-full object-cover transform group-hover:scale-110 transition duration-700">
                                <div class="absolute inset-0 z-20 flex items-center justify-center">
                                    <span class="text-4xl font-black text-white drop-shadow-lg">TEA</span>
                                </div>
                            </button>
                        </div>

                        <div id="choice-1-result" class="hidden mt-10 text-center fade-in">
                            <p id="choice-1-text" class="text-3xl font-bold text-emerald-400 bg-slate-800/80 px-8 py-4 rounded-full border border-slate-700"></p>
                            <div class="mt-6 p-4 bg-white/5 rounded-lg border border-white/10 text-gray-300 max-w-lg mx-auto">
                                <span class="text-amber-400 font-bold">Speak:</span> What time do you drink it? Do you add sugar?
                            </div>
                        </div>
                    </div>
                `
            },

            // ==========================================
            // VOCABULARY (Steps 7-8)
            // ==========================================
            {
                title: "Vocab: Morning",
                content: `
                    <div class="w-full h-full flex flex-col items-center justify-center bg-gradient-to-br from-blue-900 via-slate-900 to-black slide-up p-8">
                        <h2 class="text-3xl font-bold mb-2 text-white">Morning Actions</h2>
                        <p class="text-gray-400 mb-8">Click the cards to reveal the action.</p>
                        
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-6 max-w-5xl w-full">
                            ${generateFlipCard('🌅', 'wake up', 'What time?')}
                            ${generateFlipCard('🚿', 'take a shower', 'Hot or cold?')}
                            ${generateFlipCard('🥐', 'eat breakfast', 'What do you eat?')}
                            ${generateFlipCard('🦷', 'brush teeth', 'How many times?')}
                            ${generateFlipCard('👕', 'get dressed', 'Uniform or casual?')}
                            ${generateFlipCard('🚗', 'go to work', 'Car or bus?')}
                        </div>

                        <div class="mt-12 text-center w-full max-w-2xl bg-slate-800/50 p-6 rounded-xl border border-white/10">
                            <p class="text-emerald-400 font-bold mb-2">Speaking Starter:</p>
                            <p class="text-xl">"What is the first thing you do when you wake up?"</p>
                        </div>
                    </div>
                `
            },
            {
                title: "Vocab: Evening",
                content: `
                    <div class="w-full h-full flex flex-col items-center justify-center bg-gradient-to-br from-purple-900 via-slate-900 to-black slide-up p-8">
                        <h2 class="text-3xl font-bold mb-2 text-white">Evening Actions</h2>
                        <p class="text-gray-400 mb-8">Click the cards to reveal the action.</p>
                        
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-6 max-w-5xl w-full">
                            ${generateFlipCard('🏠', 'come home', 'What time?')}
                            ${generateFlipCard('🍳', 'cook dinner', 'Who cooks?')}
                            ${generateFlipCard('📺', 'watch TV', 'What show?')}
                            ${generateFlipCard('📚', 'read a book', 'Do you like reading?')}
                            ${generateFlipCard('📱', 'check phone', 'Instagram or TikTok?')}
                            ${generateFlipCard('🛏️', 'go to sleep', 'Are you tired?')}
                        </div>

                        <div class="mt-12 text-center w-full max-w-2xl bg-slate-800/50 p-6 rounded-xl border border-white/10">
                            <p class="text-emerald-400 font-bold mb-2">Speaking Starter:</p>
                            <p class="text-xl">"What time do you usually go to sleep?"</p>
                        </div>
                    </div>
                `
            },

            // ==========================================
            // INPUT (Steps 9-10)
            // ==========================================
            {
                title: "Input: Meet Emma",
                content: `
                    <div class="w-full h-full flex items-center justify-center bg-slate-950 slide-up p-8">
                        <div class="max-w-5xl w-full flex bg-slate-900 rounded-3xl overflow-hidden border border-slate-800 shadow-2xl">
                            <div class="w-2/5 relative">
                                <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=800" class="absolute inset-0 w-full h-full object-cover">
                            </div>
                            <div class="w-3/5 p-12 flex flex-col justify-center">

        // ==========================================
        // SYSTEM LOGIC
        // ==========================================
        let currentStep = 0;
        const totalSteps = slides.length;

        function init() {
            renderNavLinks();
            renderSlide(currentStep);
            updateProgress();
        }

        function renderSlide(index) {
            const container = document.getElementById('slide-container');
            container.innerHTML = slides[index].content;
        }

        function nextSlide() {
            if (currentStep < totalSteps - 1) {
                currentStep++;
                renderSlide(currentStep);
                updateProgress();
                updateNavHighlight();
            }
        }

        function prevSlide() {
            if (currentStep > 0) {
                currentStep--;
                renderSlide(currentStep);
                updateProgress();
                updateNavHighlight();
            }
        }

        function jumpToSlide(index) {
            currentStep = index;
            renderSlide(currentStep);
            updateProgress();
            updateNavHighlight();
            if(window.innerWidth < 1024) toggleSidebar(); // auto close on mobile
        }

        function updateProgress() {
            document.getElementById('step-counter').innerText = `${currentStep + 1}/${totalSteps}`;
            const percentage = ((currentStep + 1) / totalSteps) * 100;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        function toggleTeacherBoard() {
            const board = document.getElementById('teacher-board');
            board.classList.toggle('translate-x-full');
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function renderNavLinks() {
            const navContainer = document.getElementById('nav-links');
            let html = '<ul class="space-y-1">';
            slides.forEach((slide, index) => {
                let badge = '';
                if(slide.title.startsWith('TG')) badge = '<span class="text-[10px] bg-slate-700 px-1 rounded ml-2">Guide</span>';
                if(slide.title.startsWith('Speaking')) badge = '<span class="text-[10px] bg-orange-600 px-1 rounded ml-2">Speak</span>';
                if(slide.title.startsWith('Drill')) badge = '<span class="text-[10px] bg-blue-600 px-1 rounded ml-2">Drill</span>';

                html += `
                    <li>
                        <button id="nav-btn-${index}" onclick="jumpToSlide(${index})" class="w-full text-left px-3 py-2 rounded text-sm text-gray-400 hover:bg-white/10 hover:text-white transition flex justify-between items-center">
                            <span class="truncate">${index + 1}. ${slide.title}</span>
                            ${badge}
                        </button>
                    </li>
                `;
            });
            html += '</ul>';
            navContainer.innerHTML = html;
            updateNavHighlight();
        }

        function updateNavHighlight() {
            for(let i=0; i<totalSteps; i++) {
                const btn = document.getElementById(`nav-btn-${i}`);
                if(btn) {
                    if(i === currentStep) {
                        btn.classList.add('bg-emerald-900/30', 'text-emerald-400', 'border-l-2', 'border-emerald-500');
                        btn.classList.remove('text-gray-400', 'hover:bg-white/10');
                    } else {
                        btn.classList.remove('bg-emerald-900/30', 'text-emerald-400', 'border-l-2', 'border-emerald-500');
                        btn.classList.add('text-gray-400', 'hover:bg-white/10');
                    }
                }
            }
        }

                        <div id="${id}-follow" class="hidden mt-12 p-6 bg-emerald-900/20 border border-emerald-500/50 rounded-2xl fade-in text-center">
                            <span class="text-emerald-400 font-bold text-sm uppercase tracking-widest block mb-2">Speaking Starter</span>
                            <span class="text-2xl text-white font-light">"${followUp}"</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function checkDrill(btn, isCorrect, id) {
            // Disable all buttons in this group
            const container = document.getElementById(`${id}-options`);
            const buttons = container.querySelectorAll('button');
            buttons.forEach(b => {
                b.disabled = true;
                b.classList.add('opacity-50', 'cursor-not-allowed');
            });

            if (isCorrect) {
                btn.classList.remove('bg-slate-800', 'border-slate-700', 'opacity-50');
                btn.classList.add('bg-emerald-600', 'border-emerald-400', 'text-white', 'correct-pulse');
                document.getElementById(`${id}-follow`).classList.remove('hidden');
            } else {
                btn.classList.remove('bg-slate-800', 'border-slate-700');
                btn.classList.add('bg-red-600', 'border-red-400', 'text-white');
                // Automatically find correct button and show it
                buttons.forEach(b => {
                    if(b.getAttribute('onclick').includes('true')) {
                        b.classList.remove('opacity-50', 'bg-slate-800', 'border-slate-700');
                        b.classList.add('bg-emerald-600', 'border-emerald-400', 'text-white');
                    }
                });
                // Still show follow up to maintain flow
                setTimeout(() => {
                    document.getElementById(`${id}-follow`).classList.remove('hidden');
                }, 1000);
            }
        }

        function selectSpectrum(btn, followUpText) {
            // Reset others
            const container = btn.parentElement;
            const buttons = container.querySelectorAll('button');
            buttons.forEach(b => {
                b.classList.remove('transform', 'scale-110', 'shadow-xl');
                b.style.opacity = '0.5';
            });
            
            // Highlight selected
            btn.style.opacity = '1';
            btn.classList.add('transform', 'scale-110', 'shadow-xl');

            // Show result
            const res = container.nextElementSibling;
            res.innerText = followUpText;
            res.classList.remove('hidden');
        }

        function showDecision(text, followUp) {
            document.getElementById('decision-text').innerText = text;
            document.getElementById('decision-follow').innerText = "Teacher Speak: " + followUp;
            document.getElementById('decision-res').classList.remove('hidden');
        }

        // Initialize App
        window.onload = init;

    </script>
</body>
</html>
